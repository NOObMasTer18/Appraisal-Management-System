spring.datasource.url=jdbc:mysql://mysql:3306/appraisal_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=appraisal_user
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

app.frontend.url=${FRONTEND_URL:https://appraisal-management-system-fronten.vercel.app}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=3000

# Override these in your .env file on EC2
admin.email=${ADMIN_EMAIL:admin@psi.com}
admin.password=${ADMIN_PASSWORD:Admin@1234}

# Override these in your .env file on EC2
hr.admin.email=${HR_ADMIN_EMAIL:hr.admin@psi.com}
hr.admin.password=${HR_ADMIN_PASSWORD:HrAdmin@1234}